# Application name
spring.application.name=Online Marketplace API

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/marketplacedb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# REMOVE this line - it's forcing H2 dialect:
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Let Hibernate auto-detect the dialect (PostgreSQL will be used automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (Basic Auth) - These are for in-memory users only
# Your database users will work through your UserDetailsService
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# External API (Payment Gateway Simulation)
payment.gateway.url=https://jsonplaceholder.typicode.com/posts
payment.gateway.api-key=demo-key

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.onlinemarketplace=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.access=DEBUG

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html